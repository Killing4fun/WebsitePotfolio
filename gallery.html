<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gallery and Magazine showcases by Amirul Ehsan Bin Roslan.">
    <title>Gallery | Amirul Ehsan</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <script src="js/nav.js"></script>

    <main id="page-content">
        <div class="page-header">
            <div class="container">
                <h2>Gallery &amp; Showcase</h2>
            </div>
        </div>

        <section class="gallery-section">
            <div class="container">
                <p class="section-intro">
                    A collection of digital designs, publication covers, and creative media projects.
                    Click on any card to view the asset in high resolution.
                </p>

                <!-- Gallery Filters -->
                <div class="gallery-filters">
                    <button class="gallery-filter-btn active" data-filter="all">All Assets</button>
                    <button class="gallery-filter-btn" data-filter="magazine">Magazine Covers</button>
                    <button class="gallery-filter-btn" data-filter="design">UI/UX Design</button>
                </div>

                <!-- Gallery Grid -->
                <div class="gallery-grid" id="gallery-grid">
                    <!-- Dynamic cards injected by gallery.js -->
                </div>
            </div>
        </section>

        <!-- Lightbox Modal (Dynamic) -->
        <div id="lightbox-modal" class="lightbox-modal">
            <button id="lightbox-close" class="lightbox-close" aria-label="Close Lightbox">&times;</button>
            <button id="lightbox-prev" class="lightbox-arrow" aria-label="Previous image">&#10094;</button>
            <button id="lightbox-next" class="lightbox-arrow" aria-label="Next image">&#10095;</button>
            <div class="lightbox-inner">
                <img id="lightbox-img" src="" alt="Lightbox View">
                <div id="lightbox-title" class="lightbox-title"></div>
            </div>
        </div>

        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 Amirul Ehsan Bin Roslan</p>
            </div>
        </footer>
    </main>

    <!-- Shared scripts -->
    <script src="js/playlist.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/certification.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/player.js"></script>
    <script src="js/music.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
